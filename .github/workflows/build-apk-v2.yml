name: Build PWA APK

on:
  workflow_dispatch:
    inputs:
      pwa_url:
        description: 'URL-ul PWA'
        required: true
        default: 'https://vivos-land.vercel.app'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUBBLEWRAP_KEYSTORE_PASSWORD: vivos123
      BUBBLEWRAP_KEY_PASSWORD: vivos123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Check tools
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          java -version

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          }
          EOF
          cat ~/.bubblewrap/config.json

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json <<EOF
          {
            "packageId": "com.vivos.app",
            "host": "vivos-land.vercel.app",
            "name": "VIVOS",
            "launcherName": "VIVOS",
            "display": "standalone",
            "themeColor": "#173F74",
            "navigationColor": "#173F74",
            "backgroundColor": "#ffffff",
            "enableNotifications": true,
            "startUrl": "/",
            "iconUrl": "https://vivos-land.vercel.app/icons/icon-512.png",
            "maskableIconUrl": "https://vivos-land.vercel.app/icons/icon-512-maskable.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "vivos"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://vivos-land.vercel.app/",
            "minSdkVersion": 21,
            "orientation": "default",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "webManifestUrl": "https://vivos-land.vercel.app/manifest.webmanifest"
          }
          EOF

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -keystore android.keystore \
            -alias vivos \
            -storepass vivos123 \
            -keypass vivos123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=VIVOS, OU=App, O=VIVOS, L=Bucuresti, S=Romania, C=RO"

      - name: Regenerate Android project
        run: |
          npx @bubblewrap/cli update \
            --manifest twa-manifest.json \
            --skipVersionUpgrade

      - name: Build release artifacts
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Sign release APK
        shell: bash
        run: |
          set -e

          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          BUILD_TOOLS_DIR=$(find "$SDK_PATH/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)

          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"

          UNSIGNED_APK=$(find . -type f -name "*release-unsigned.apk" | head -n 1)

          if [ -z "$UNSIGNED_APK" ]; then
            echo "Unsigned release APK not found"
            exit 1
          fi

          mkdir -p signed-output

          ALIGNED_APK="signed-output/app-release-aligned.apk"
          SIGNED_APK="signed-output/app-release-signed.apk"

          "$ZIPALIGN" -v -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          "$APKSIGNER" sign \
            --ks android.keystore \
            --ks-key-alias vivos \
            --ks-pass pass:vivos123 \
            --key-pass pass:vivos123 \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$APKSIGNER" verify "$SIGNED_APK"

          echo "SIGNED_APK=$SIGNED_APK" >> $GITHUB_ENV

      - name: Find artifacts
        run: find . -type f \( -name "*.apk" -o -name "*.aab" \)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vivos-app
          path: |
            signed-output/app-release-signed.apk
            **/*.aab
