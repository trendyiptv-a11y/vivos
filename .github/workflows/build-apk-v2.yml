name: Build PWA APK

on:
  workflow_dispatch:
    inputs:
      pwa_url:
        description: 'URL-ul PWA'
        required: true
        default: 'https://vivos-land.vercel.app'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Check Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json <<EOF
          {
            "packageId": "com.vivos.app",
            "host": "vivos-land.vercel.app",
            "name": "VIVOS",
            "launcherName": "VIVOS",
            "display": "standalone",
            "themeColor": "#173F74",
            "navigationColor": "#173F74",
            "backgroundColor": "#ffffff",
            "enableNotifications": true,
            "startUrl": "/",
            "iconUrl": "https://vivos-land.vercel.app/icons/icon-512.png",
            "maskableIconUrl": "https://vivos-land.vercel.app/icons/icon-512-maskable.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "vivos"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://vivos-land.vercel.app/",
            "minSdkVersion": 21,
            "orientation": "default",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "webManifestUrl": "https://vivos-land.vercel.app/manifest.json"
          }
          EOF

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -keystore android.keystore \
            -alias vivos \
            -storepass vivos123 \
            -keypass vivos123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=VIVOS, OU=App, O=VIVOS, L=Bucuresti, S=Romania, C=RO"

      - name: Build APK
        env:
          CI: true
        run: |
          npx @bubblewrap/cli build \
            --manifest twa-manifest.json \
            --skipPwaValidation \
            --jdkPath="$JAVA_HOME"

      - name: Find APKs
        run: find . -type f \( -name "*.apk" -o -name "*.aab" \)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vivos-app
          path: |
            **/*.apk
            **/*.aab
